# Online Education Platform - Nginx Reverse Proxy Config
# Deploy to: /etc/nginx/sites-available/online-edu
# Then: ln -s /etc/nginx/sites-available/online-edu /etc/nginx/sites-enabled/

# Portal frontend - port 80
server {
    listen 80 default_server;
    server_name _;
    root /var/www/portal;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100m;
    }

    location /files/ { proxy_pass http://localhost:8088/files/; }
}

